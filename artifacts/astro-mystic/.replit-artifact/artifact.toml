kind = "web"
previewPath = "/"
title = "AstroMystic"
version = "1.0.0"
id = "artifacts/astro-mystic"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 22228

[services.development]
run = "pnpm --filter @workspace/astro-mystic run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/astro-mystic", "run", "build" ]
publicDir = "artifacts/astro-mystic/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22228"
BASE_PATH = "/"
